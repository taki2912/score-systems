{% extends "base.html" %}
{% block title %}创建俱乐部{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-11 col-sm-8 col-md-6">
        <div class="card shadow">
            <div class="card-body">
                <h4 class="card-title mb-4">创建俱乐部</h4>
                <form method="POST">
                    <div class="mb-3">
                        <label class="form-label">俱乐部名称 <span class="text-danger">*</span></label>
                        <input type="text" class="form-control" name="name" required
                               placeholder="请输入俱乐部名称">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">简介</label>
                        <textarea class="form-control" name="description" rows="3"
                                  placeholder="可选，简单描述"></textarea>
                    </div>
                    <button type="submit" class="btn btn-primary w-100">创建</button>
                    <a href="{{ url_for('admin_clubs') }}" class="btn btn-outline-secondary w-100 mt-2">返回</a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
