{% extends "base.html" %}
{% block title %}编辑成员 - {{ member.name }}{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-11 col-sm-8 col-md-6">
        <div class="card shadow">
            <div class="card-body">
                <h4 class="card-title mb-4">编辑成员 - {{ member.name }}</h4>
                <form method="POST" enctype="multipart/form-data">
                    <div class="text-center mb-3">
                        {% if member.avatar %}
                        <img src="{{ url_for('static', filename='avatars/' + member.avatar) }}"
                             alt="{{ member.name }}" class="rounded-circle"
                             style="width:80px;height:80px;object-fit:cover;">
                        {% else %}
                        <div class="rounded-circle bg-light d-inline-flex align-items-center justify-content-center"
                             style="width:80px;height:80px;">
                            <span class="display-6 text-secondary">{{ member.name[0] }}</span>
                        </div>
                        {% endif %}
                    </div>

                    {% if current_user.is_super_admin %}
                    <div class="mb-3">
                        <label class="form-label">成员 ID</label>
                        <input type="text" class="form-control" name="display_id"
                               value="{{ member.display_id }}">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">名称</label>
                        <input type="text" class="form-control" name="name"
                               value="{{ member.name }}">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">更换头像</label>
                        <input type="file" class="form-control" name="avatar"
                               accept="image/png,image/jpeg,image/gif,image/webp">
                        <div class="form-text">留空则不更换</div>
                    </div>
                    {% endif %}

                    <div class="mb-3">
                        <label class="form-label">当前分数: <strong class="text-primary">{{ member.score|score_fmt }}</strong></label>
                        <input type="number" step="1" class="form-control" name="new_score"
                               value="{{ member.score }}" placeholder="如: 10000, 50000">
                        <div class="form-text">如: 10000, 50000</div>
                    </div>
                    <div class="mb-3" id="reasonBlock">
                        <label class="form-label">修改分数原因 <span class="text-danger">*</span></label>
                        <textarea class="form-control" name="reason" rows="2"
                                  placeholder="修改分数时必须填写原因"></textarea>
                    </div>
                    <button type="submit" class="btn btn-warning w-100">保存修改</button>
                    <a href="{{ url_for('admin_club_members', club_id=member.club_id) }}"
                       class="btn btn-outline-secondary w-100 mt-2">返回</a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
