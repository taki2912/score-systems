{% extends "base.html" %}
{% block title %}申请查看 - {{ member.name }}{% endblock %}

{% block content %}
<div class="row justify-content-center mt-3">
    <div class="col-11 col-sm-8 col-md-6">
        <div class="card shadow border-0">
            <div class="card-body p-4">
                <!-- 成员信息 -->
                <div class="d-flex align-items-center mb-4">
                    {% if member.avatar %}
                    <img src="{{ url_for('static', filename='avatars/' + member.avatar) }}"
                         alt="{{ member.name }}" class="rounded-circle me-3" style="width:56px;height:56px;object-fit:cover;">
                    {% else %}
                    <div class="rounded-circle bg-light d-flex align-items-center justify-content-center me-3"
                         style="width:56px;height:56px;">
                        <span class="fs-4 text-secondary">{{ member.name[0] }}</span>
                    </div>
                    {% endif %}
                    <div>
                        <h5 class="mb-0">{{ member.name }}</h5>
                        <p class="text-muted mb-0 small">ID: {{ member.display_id }}</p>
                    </div>
                </div>

                <h5 class="mb-3">申请查看历史记录</h5>
                <form method="POST">
                    <div class="mb-4">
                        <label class="form-label fw-bold">是否为本人？</label>
                        <div class="form-check mb-2">
                            <input class="form-check-input" type="radio" name="is_self"
                                   id="selfYes" value="yes" checked>
                            <label class="form-check-label" for="selfYes">是，我是本人</label>
                        </div>
                        <div class="form-check">
                            <input class="form-check-input" type="radio" name="is_self"
                                   id="selfNo" value="no">
                            <label class="form-check-label" for="selfNo">否，我代为查看</label>
                        </div>
                    </div>

                    <div class="mb-4 d-none" id="notSelfBlock">
                        <label class="form-label fw-bold">代为查看原因 <span class="text-danger">*</span></label>
                        <textarea class="form-control" name="not_self_reason" rows="3"
                                  placeholder="请说明为何非本人查看"></textarea>
                    </div>

                    <button type="submit" class="btn btn-primary w-100 btn-lg">提交申请</button>
                    <a href="{{ url_for('member_detail', member_id=member.id) }}"
                       class="btn btn-outline-secondary w-100 mt-2">取消</a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
document.querySelectorAll('input[name="is_self"]').forEach(function(radio) {
    radio.addEventListener('change', function() {
        document.getElementById('notSelfBlock').classList.toggle('d-none', this.value === 'yes');
    });
});
</script>
{% endblock %}
