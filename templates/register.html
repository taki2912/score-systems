{% extends "base.html" %}
{% block title %}注册 - 计分系统{% endblock %}

{% block content %}
<div class="row justify-content-center mt-4">
    <div class="col-11 col-sm-8 col-md-5 col-lg-4">
        <div class="card shadow">
            <div class="card-body">
                <h4 class="card-title text-center mb-4">注册账号</h4>
                <form method="POST">
                    <div class="mb-3">
                        <label for="username" class="form-label">用户名</label>
                        <input type="text" class="form-control" id="username" name="username"
                               placeholder="2-20位" required autofocus>
                    </div>
                    <div class="mb-3">
                        <label for="password" class="form-label">密码</label>
                        <input type="password" class="form-control" id="password" name="password"
                               placeholder="至少6位" minlength="6" required>
                    </div>
                    <div class="mb-3">
                        <label for="confirm_password" class="form-label">确认密码</label>
                        <input type="password" class="form-control" id="confirm_password"
                               name="confirm_password" placeholder="再次输入密码" minlength="6" required>
                    </div>
                    <button type="submit" class="btn btn-primary w-100">注册</button>
                </form>
                <div class="text-center mt-3">
                    <span class="text-muted">已有账号？</span>
                    <a href="{{ url_for('login') }}">去登录</a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
